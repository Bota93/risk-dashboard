<section>
    <div class="section-header">
        <div class="section-heading">
            <h2>Dashboard</h2>
            <p class="section-copy">
                High-level visibility into registered operations and current
                portfolio exposure.
            </p>
        </div>

        <div class="section-toolbar">
            <a class="action-link action-link--secondary" routerLink="/operations">
                View Operations
            </a>
            <a class="action-link action-link--primary" routerLink="/operations/new">
                New Operation
            </a>
        </div>
    </div>

    <div class="metrics">
        <article class="card metric-card">
            <p>Total</p>
            <strong>{{ total() }}</strong>
        </article>

        <article class="card metric-card">
            <p>Pending</p>
            <strong>{{ pending() }}</strong>
        </article>

        <article class="card metric-card">
            <p>Approved</p>
            <strong>{{ approved() }}</strong>
        </article>

        <article class="card metric-card">
            <p>Rejected</p>
            <strong>{{ rejected() }}</strong>
        </article>

        <article class="card metric-card">
            <p>High Risk</p>
            <strong>{{ highRisk() }}</strong>
        </article>
    </div>
</section>
