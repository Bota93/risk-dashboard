<section>
    <h2>Operations</h2>
    <a routerLink="/operations/new">Create Operation</a>

    @if (operationService.operations().length === 0) {
    <p>No operations yet.</p>
    }

    @for (op of operationService.operations(); track op.id) {
    <article class="card">
        <h3>{{ op.clientName }}</h3>
        <p>Amount: {{ op.amount }} €</p>
        <p>Status: {{ op.status }}</p>
        <p>Risk: {{ op.riskLevel }}</p>

        <button (click)="deleteOperation(op.id)">
            Delete
        </button>
    </article>
    }
</section>
