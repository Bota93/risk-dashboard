<section>
    <div class="section-header">
        <div class="section-heading">
            <a class="text-link" routerLink="/operations">Back to operations</a>
            <h2>{{ isEditMode() ? 'Edit Operation' : 'Create Operation' }}</h2>
            <p class="section-copy">
                {{
                    isEditMode()
                        ? 'Update the selected financial operation and save the new record.'
                        : 'Capture a new financial operation for risk tracking and monitoring.'
                }}
            </p>
        </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
            Client Name
            <input formControlName="clientName" />
        </label>

        <label>
            Amount
            <input type="number" formControlName="amount" />
        </label>

        <label>
            Status
            <select formControlName="status">
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </label>

        <label>
            Risk Level
            <select formControlName="riskLevel">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </label>

        <label>
            Description
            <textarea formControlName="description"></textarea>
        </label>

        <div class="form-actions">
            <a class="action-link action-link--ghost" routerLink="/operations">
                Cancel
            </a>
            <button class="action-link action-link--primary" type="submit" [disabled]="form.invalid">
                {{ isEditMode() ? 'Update' : 'Create' }}
            </button>
        </div>
    </form>
</section>
